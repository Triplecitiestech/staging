name: Auto-merge Claude branches

# Gated auto-merge: a push to claude/** reaches main (and therefore
# production) after BOTH of the following succeed on that exact commit:
#
#   1. secret-scan   — gitleaks
#   2. quality       — lint + schema-drift check + production build + unit tests
#
# The full Playwright e2e suite (e2e-preview job) still runs against the
# commit's Vercel preview, but as a NON-BLOCKING signal: per the owner's
# 2026-07-10 direction, its 15-45 min runtime no longer holds the merge.
# A red e2e-preview on a merged commit means production is already live
# with something the suite flagged — investigate it immediately
# (npm run debug:failures / the run's failure artifacts), don't ignore it.
#
# [skip-e2e] in the commit message skips the informational e2e run
# entirely (e.g. Vercel integration down so no preview will ever appear).
# Gates 1-2 can never be skipped — the ungated version of this workflow
# shipped broken commits straight to production (see docs/gotchas.md →
# CI/CD & Deploy Pipeline).

on:
  push:
    branches:
      - 'claude/**'

concurrency:
  group: auto-merge-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  deployments: read
  pull-requests: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  quality:
    uses: ./.github/workflows/quality-gates.yml

  e2e-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: ${{ !contains(github.event.head_commit.message, '[skip-e2e]') }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for Vercel preview deployment
        id: preview
        run: |
          # Vercel's GitHub integration creates a Deployment for every push and
          # posts statuses to it. Poll until this commit's preview is live.
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          echo "Waiting for Vercel preview deployment of $SHA …"
          for i in $(seq 1 60); do
            DEPLOYMENT_ID=$(gh api "repos/$REPO/deployments?sha=$SHA&per_page=10" \
              --jq '[.[] | select(.environment | test("(?i)preview"))][0].id' 2>/dev/null || true)
            if [ -n "$DEPLOYMENT_ID" ] && [ "$DEPLOYMENT_ID" != "null" ]; then
              STATE=$(gh api "repos/$REPO/deployments/$DEPLOYMENT_ID/statuses?per_page=1" \
                --jq '.[0].state' 2>/dev/null || true)
              URL=$(gh api "repos/$REPO/deployments/$DEPLOYMENT_ID/statuses?per_page=1" \
                --jq '.[0].environment_url // .[0].target_url // empty' 2>/dev/null || true)
              echo "  attempt $i: deployment $DEPLOYMENT_ID state=$STATE"
              if [ "$STATE" = "success" ] && [ -n "$URL" ]; then
                echo "Preview ready: $URL"
                echo "url=$URL" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              if [ "$STATE" = "failure" ] || [ "$STATE" = "error" ]; then
                echo "::error::Vercel preview deployment FAILED for $SHA — fix the deploy before merging."
                exit 1
              fi
            else
              echo "  attempt $i: no preview deployment yet"
            fi
            sleep 30
          done
          echo "::error::Timed out (30 min) waiting for a Vercel preview deployment. Is the Vercel GitHub integration healthy? If the integration itself is broken, push again with [skip-e2e] in the commit message and record it in docs/session-summary.md."
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run e2e suite against preview
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.url }}
          E2E_TEST_SECRET: ${{ secrets.E2E_TEST_SECRET }}
          # Required while Vercel Deployment Protection is on — without it every
          # preview route 401s and the whole suite fails (docs/gotchas.md → CI/CD)
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          CI: 'true'
        run: npm run test:e2e

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failures-${{ github.sha }}
          path: |
            test-results/failures/
            playwright-report/
          retention-days: 14
          if-no-files-found: ignore

  merge:
    runs-on: ubuntu-latest
    # e2e-preview intentionally NOT in needs (owner direction 2026-07-10):
    # it keeps running as a non-blocking signal. secret-scan and quality
    # must always be green — do not remove them (docs/gotchas.md → CI/CD).
    needs: [secret-scan, quality]
    if: >-
      always() &&
      needs.secret-scan.result == 'success' &&
      needs.quality.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Merge to main
        run: |
          git fetch origin main
          git checkout main
          git merge ${{ github.ref_name }} --no-ff -m "Auto-merge: ${{ github.ref_name }} (gates passed)"
          git push origin main
